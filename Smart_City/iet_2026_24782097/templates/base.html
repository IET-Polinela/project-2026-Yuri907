<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}IET City{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <!-- CUSTOM STYLE -->
    <style>
        body {
            background-color: #f4f8ff;
        }

        .navbar {
            background: linear-gradient(90deg, #0d6efd, #3a8bfd);
        }

        .navbar-brand {
            font-weight: bold;
            letter-spacing: 1px;
        }

        .nav-link {
            color: white !important;
            transition: 0.3s;
        }

        .nav-link:hover {
            opacity: 0.8;
        }

        .main-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.05);
        }

        table tbody tr:hover {
            background-color: #f1f7ff;
            transition: 0.2s;
        }

        footer {
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        
        /* TABLE GARIS */
        .table {
            border: 1px solid #dbe5f1;
        }

        .table thead th {
            background-color: #2c3e50 !important;
            color: white !important;
            border: 1px solid #2c3e50;
            text-align: center;
        }

        .table tbody td {
            border: 1px solid #e3eaf3;
            vertical-align: middle;
        }

        /* ROW LEBIH RAPI */
        .table tbody tr {
            background-color: #ffffff;
        }

        /* BUTTON FULL COLOR */
        .btn-outline-primary {
            background-color: #0d6efd;
            color: white;
            border: none;
        }

        .btn-outline-primary:hover {
            background-color: #0b5ed7;
        }

        .btn-outline-warning {
            background-color: #ffc107;
            color: black;
            border: none;
        }

        .btn-outline-warning:hover {
            background-color: #e0a800;
        }

        .btn-outline-danger {
            background-color: #dc3545;
            color: white;
            border: none;
        }

        .btn-outline-danger:hover {
            background-color: #bb2d3b;
        }

        .btn-outline-info {
            background-color: #0dcaf0;
            color: black;
            border: none;
        }

        .btn-outline-info:hover {
            background-color: #31d2f2;
        }

        .btn-outline-success {
            background-color: #198754;
            color: white;
            border: none;
        }

        .btn-outline-success:hover {
            background-color: #157347;
        }

        /* BIAR BUTTON LEBIH COMPACT */
        .btn-sm {
            padding: 4px 10px;
            font-size: 13px;
            border-radius: 6px;
        }

    </style>
</head>

<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">

        <a class="navbar-brand" href="/">
            <i class="bi bi-building"></i> IET City
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/reports/">Reports</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/about/">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/contacts/">Contact</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<div class="container mt-3">
    {% if messages %}
        {% for message in messages %}
            <div class="alert 
                {% if message.tags == 'error' %}
                    alert-danger
                {% else %}
                    alert-{{ message.tags }}
                {% endif %}
                alert-dismissible fade show shadow-sm" role="alert">

                {{ message }}

                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}
</div>

<!-- MAIN CONTENT -->
<div class="container mt-4 flex-grow-1">
    <div class="main-container">
        {% block content %}
        {% endblock %}
    </div>
</div>

<!-- FOOTER -->
<footer class="bg-primary text-white text-center py-3 mt-auto shadow-sm">
    © 2026 Smart City Lampung Barat
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
