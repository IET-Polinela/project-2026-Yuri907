{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height:70vh;">
    <div class="card shadow-lg border-0 rounded-4 p-4" style="max-width:500px; width:100%;">

        <!-- Header -->
        <div class="text-center mb-4">
            <h1 class="fw-bold text-primary mb-1">LOGIN</h1>
            <p class="text-muted mb-0">Lampung Barat City</p>
            <hr>
        </div>

        <!-- Form -->
        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                {{ form.username }}
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>

                <!-- TAMBAHAN ICON MATA -->
                <div class="password-wrapper">
                    {{ form.password }}
                    <button type="button"
                            class="eye-btn"
                            onclick="togglePassword('id_password', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 rounded-3 fw-semibold">
                Login
            </button>
        </form>

        <!-- Footer Link -->
        <div class="text-center mt-4">
            <small class="text-muted">
                Belum punya akun?
                <a href="{% url 'register' %}" class="fw-semibold text-decoration-none">
                    Register
                </a>
            </small>
        </div>

    </div>
</div>

<style>
input {
    width: 100%;
    padding: 10px 45px 10px 12px;
    border: 1px solid #ced4da;
    border-radius: 10px;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: #0d6efd;
    box-shadow: 0 0 0 0.15rem rgba(13,110,253,.25);
}

/* TAMBAHAN POSISI ICON */
.password-wrapper {
    position: relative;
}

.eye-btn {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    border: none;
    background: transparent;
    padding: 0;
    color: #6c757d;
    font-size: 18px;
    cursor: pointer;
}

.eye-btn:hover {
    color: #0d6efd;
}

ul.errorlist {
    list-style: none;
    padding: 0;
    margin-bottom: 8px;
    color: red;
    font-size: 14px;
}
</style>

<script>
function togglePassword(fieldId, btn) {
    let field = document.getElementById(fieldId);
    let icon = btn.querySelector("i");

    if (field.type === "password") {
        field.type = "text";
        icon.className = "bi bi-eye-slash";
    } else {
        field.type = "password";
        icon.className = "bi bi-eye";
    }
}
</script>

{% endblock %}
