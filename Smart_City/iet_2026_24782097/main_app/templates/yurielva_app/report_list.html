<!DOCTYPE html>
<html>
<head>
    <title>Daftar Laporan</title>
</head>
<body>

<h1>Daftar Laporan</h1>

<a href="{% url 'add_report' %}">Tambah Laporan</a>
<br><br>

<table border="1">
    <tr>
        <th>Title</th>
        <th>Category</th>
        <th>Description</th>
        <th>Location</th>
        <th>Aksi</th>
    </tr>

    {% for report in reports %}
    <tr>
        <td>{{ report.title }}</td>
        <td>{{ report.category }}</td>
        <td>{{ report.description }}</td>
        <td>{{ report.location }}</td>
        <td>
            <a href="{% url 'edit_report' report.id %}">Edit</a> |
            <a href="{% url 'delete_report' report.id %}">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

<br>
<a href="{% url 'home' %}">Kembali ke Home</a>

</body>
</html>
