<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Portal - Smart City Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .spa-container {
            min-height: calc(100vh - 80px);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#login">
                <i class="bi bi-buildings-fill me-2"></i>
                Smart City Portal
            </a>

            <div id="nav-menus" class="ms-auto"></div>
        </div>
    </nav>

    <main class="container-fluid px-4 mt-4 spa-container"
          id="app-content">
    </main>

    <!-- Modal Tambah/Edit Laporan -->
    <div class="modal fade"
         id="reportModal"
         tabindex="-1"
         aria-labelledby="reportModalLabel"
         aria-hidden="true">

        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">

                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold"
                        id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>
                        Buat Laporan Baru
                    </h5>

                    <button type="button"
                            class="btn-close btn-close-white"
                            data-bs-dismiss="modal"
                            aria-label="Close">
                    </button>
                </div>

                <div class="modal-body">

                    <form id="reportForm">

                        <div class="mb-3">
                            <label for="reportTitle"
                                   class="form-label">
                                Judul Laporan
                            </label>

                            <input type="text"
                                   class="form-control"
                                   id="reportTitle"
                                   placeholder="Masukkan judul laporan"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label for="reportCategory"
                                   class="form-label">
                                Kategori
                            </label>

                            <input type="text"
                                   class="form-control"
                                   id="reportCategory"
                                   placeholder="Contoh: Jalan Rusak, Lampu Mati"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label for="reportLocation"
                                   class="form-label">
                                Lokasi
                            </label>

                            <input type="text"
                                   class="form-control"
                                   id="reportLocation"
                                   placeholder="Masukkan lokasi kejadian"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label for="reportDescription"
                                   class="form-label">
                                Deskripsi
                            </label>

                            <textarea class="form-control"
                                      id="reportDescription"
                                      rows="4"
                                      placeholder="Tuliskan deskripsi laporan"
                                      required></textarea>
                        </div>

                        <div class="d-flex justify-content-between mt-4">

                            <button type="button"
                                    class="btn btn-outline-secondary"
                                    id="btnDraft">
                                Simpan Draft
                            </button>

                            <button type="button"
                                    class="btn btn-primary"
                                    id="btnSubmit">
                                Ajukan
                                <i class="bi bi-send-fill ms-1"></i>
                            </button>

                        </div>

                    </form>

                </div>

            </div>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS Aplikasi -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>

</body>
</html>
