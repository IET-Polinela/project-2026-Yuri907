name: Deploy Frontend SPA to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Mencegah 2 proses deploy berjalan bersamaan (penyebab error
# "Multiple artifacts named github-pages"). Kalau ada push baru
# sementara deploy sebelumnya masih berjalan, run baru akan
# menunggu run sebelumnya selesai, bukan jalan barengan.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './Smart_City/smartcity_citizen_spa_24782097'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4